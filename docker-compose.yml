services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: opensearch-naive-rag
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-N@iverag123}
      # plugins.security.disabled: "true"
      # DISABLE_SECURITY_PLUGIN: "true"
      # DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9300:9200"
      - "9700:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -k -u admin:N@iverag123 https://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  neo4j:
    build:
      context: .
      dockerfile: docker/neo4j/Dockerfile
    container_name: neo4j-graphrag
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7475}:7474" # HTTP (Neo4j Browser)
      - "${NEO4J_BOLT_PORT:-7688}:7687" # Bolt (driver usado pelo GraphRAG)
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-graphrag123}
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_default__advertised__address: localhost
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USERNAME:-neo4j} -p ${NEO4J_PASSWORD:-graphrag123} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  comparison:
    build:
      context: .
      dockerfile: docker/comparison/Dockerfile
    container_name: comparison-rag
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
    ports:
      - "${COMPARISON_JUPYTER_PORT:-8889}:8888"
    env_file:
      - graphrag-neo4j-langchain/.env
      - naive-rag-opensearch/.env
    environment:
      # Enderecos internos da rede docker-compose.
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-graphrag123}
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9300
      OPENSEARCH_USERNAME: ${OPENSEARCH_USERNAME:-admin}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-N@iverag123}
      PYTHONPATH: /workspace/graphrag-neo4j-langchain/src:/workspace/naive-rag-opensearch
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=
      --NotebookApp.password=

volumes:
  opensearch_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
